name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22.19
  NODE_OPTIONS: --max-old-space-size=16384

jobs:
  lint-and-types:
    name: Lint & Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check & build
        run: npm run build

  quality-gates:
    name: Stories & A11y Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Check missing stories
        run: node scripts/check-stories-coverage.mjs

      - name: Check missing play/keyboard a11y
        run: node scripts/check-a11y-coverage.mjs

  unit-tests:
    name: Unit & Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Components coverage (100% per file)
        run: npm run test:components:coverage

      - name: Composables coverage (100% per file)
        run: npm run test:composables:coverage

      - name: Utils coverage (100% per file)
        run: npm run test:utils:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage
          path: coverage/
          retention-days: 14

  storybook-tests:
    name: Storybook Interaction & A11y
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Build Storybook
        run: npm run build-storybook

      - name: Run interaction & a11y tests
        run: |
          node scripts/serve-storybook-static.mjs &
          npx wait-on http://localhost:6006
          npm run test:storybook
          pkill -f "serve-storybook-static.mjs" || true
        env:
          PLAYWRIGHT_REUSE_SERVER: "true"

  e2e-and-visual:
    name: E2E & Visual Regression
    needs: storybook-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Build Storybook
        run: npm run build-storybook

      - name: Run E2E & visual against built Storybook
        run: |
          node scripts/serve-storybook-static.mjs &
          npx wait-on http://localhost:6006
          npm run test:e2e
          npm run test:visual
        env:
          PLAYWRIGHT_REUSE_SERVER: "true"

      # === Cross-platform baseline regeneration ===
      # Без `if: always()` этот шаг skipped бы по дефолту, когда visual-тесты
      # упали на platform-различиях (как раз та ситуация, ради которой шаг
      # и нужен). Только на pull_request: никогда не на main, и head.repo.full_name
      # == github.repository защищает от форков.
      - name: Regenerate visual baselines on Linux
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          node scripts/serve-storybook-static.mjs &
          npx wait-on http://localhost:6006
          npx playwright test --config build/tests/playwright.config.ts --project=visual-chromium --update-snapshots
        env:
          PLAYWRIGHT_REUSE_SERVER: "true"

      - name: Commit updated baselines to PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(visual): regenerate baselines for Linux CI (auto)"
          file_pattern: "tests/visual-snapshots/**/*.png"

      - name: Upload Playwright results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: |
            test-results/
            tests/visual-snapshots/**/__screenshots__/*-diff.png
          retention-days: 14
